                                    </div>

                                    </div>
                                </div>
                                <!-- /.modal-content -->
                            </div>
                            <!-- /.modal-dialog -->
                        </div>

                            <div class="modal-dialog modal-lg">
                                <div class="modal-content">
                                    <div class="modal-header">
                                        <h4 class="modal-title">ACTUALIZAR CATEGORIA</h4>

                                            <span aria-hidden="true">&times;</span>
                                        </button>
                                    </div>
                                    <div class="modal-body">
                                        <form>
                                            <div class="card-body">
                                                <input type="hidden" id="id-update-categoria" value="0">
                                                <div class="form-group">
                                                    <label for="nombre-update-categoria">Nombre:</label>
                                                    <input type="text" class="form-control" id="nombre-update-categoria" placeholder="Ingrese nuevo nombre">
                                                </div>
                                            </div>

                                            <!-- /.card-body -->

                                        </form>
                                    </div>
                                    <div class="modal-footer justify-content-between">

                                </div>

                                        <form id="form-delete-categoria">
                                            <div class="card-body">
                                                <input type="hidden" id="id-delete-categoria" value="0">
                                                <div class="form-group">
                                                    <label>¿Está seguro de que desea eliminar la siguiente categoría?</label>
                                                    <input type="text" class="form-control" id="nombre-delete-categoria" readonly>
                                                </div>
                                            </div>
                                        </form>
                                    </div>
                                    <div class="modal-footer justify-content-between">
                                        <button type="button" class="btn btn-default" data-dismiss="modal">Cerrar</button>
                                        <button type="button" class="btn btn-danger" onclick="eliminarCategoria();">Eliminar categoría</button>
                                    </div>
                                </div>
                            </div>
